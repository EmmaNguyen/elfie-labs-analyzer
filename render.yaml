services:
  - type: web
    name: elfie-labs-backend-api
    runtime: python
    plan: free
    buildCommand: apt-get update && apt-get install -y poppler-utils && pip install -r backend/requirements.txt && pip install uvicorn
    startCommand: python -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 8000
      - key: QWEN_API_KEY
        sync: false
