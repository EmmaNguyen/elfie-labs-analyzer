app = "elfie-labs-analyzer-backend"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  max_machines_running = 1

[[http_service.checks]]
  interval = "1m"
  timeout = "10s"
  grace_period = "5s"
  method = "GET"
  path = "/health"
